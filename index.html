<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
background:#050505;
font-family:'Inter',sans-serif;
color:white;
overflow-x:hidden;
}

/* ROOT */
:root{
--bg:#050505;
--panel:rgba(255,255,255,.035);
--panel2:rgba(255,255,255,.05);
--line:rgba(255,255,255,.08);
--soft:#8b8b8b;
--text:#ffffff;
}

/* WRAP */
.wrap{
min-height:100vh;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at top,rgba(255,255,255,.04),transparent 30%),
linear-gradient(180deg,#050505,#090909 45%,#050505);
}

/* BLUEPRINT GRID */
.wrap::before{
content:'';
position:absolute;
inset:0;
background:
linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
background-size:40px 40px;
mask-image:linear-gradient(to bottom,rgba(255,255,255,.6),transparent 90%);
transform:perspective(900px) rotateX(72deg) scale(2.2);
transform-origin:center top;
animation:gridMove 18s linear infinite;
opacity:.55;
pointer-events:none;
}

@keyframes gridMove{
from{
background-position:0 0,0 0;
}
to{
background-position:0 120px,120px 0;
}
}

/* BLUR ORBS */
.blur{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.06;
animation:floatBlur 10s ease-in-out infinite alternate;
}

.blur.one{
width:300px;
height:300px;
background:white;
top:-100px;
left:-100px;
}

.blur.two{
width:220px;
height:220px;
background:white;
bottom:-60px;
right:-60px;
animation-duration:13s;
}

@keyframes floatBlur{
from{
transform:translateY(0px);
}
to{
transform:translateY(25px);
}
}

/* HERO */
.hero{
position:relative;
padding:56px 20px 24px;
display:flex;
justify-content:center;
z-index:2;
}

.hero-card{
width:100%;
max-width:420px;
background:linear-gradient(
180deg,
rgba(255,255,255,.045),
rgba(255,255,255,.02)
);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:34px 24px;
position:relative;
overflow:hidden;
backdrop-filter:blur(20px);
box-shadow:
0 12px 40px rgba(0,0,0,.45),
inset 0 1px 0 rgba(255,255,255,.04);
}

/* SHINE */
.hero-card::before{
content:'';
position:absolute;
top:0;
left:-140%;
width:60%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.07),
transparent
);
transform:skewX(-20deg);
animation:shine 8s linear infinite;
}

@keyframes shine{
to{
left:180%;
}
}

/* PFP */
.hero-pfp-wrap{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.hero-pfp{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.1);
box-shadow:
0 0 0 8px rgba(255,255,255,.03),
0 15px 40px rgba(0,0,0,.5);
transition:.25s;
}

.hero-pfp:hover{
transform:scale(1.03);
}

/* CLUB NAME */
.hero-name{
font-family:'Outfit',sans-serif;
font-size:32px;
font-weight:800;
line-height:1.05;
text-align:center;
letter-spacing:-1px;
margin-bottom:10px;
}

/* SUBTEXT */
.hero-sub{
text-align:center;
font-size:13px;
font-weight:500;
color:#989898;
letter-spacing:.4px;
margin-bottom:20px;
}

/* OWNER */
.owner-tag{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
margin-bottom:22px;
}

.owner-user{
font-size:13px;
font-weight:700;
color:#ffffff;
text-decoration:none;
transition:.2s;
}

.owner-user:hover{
opacity:.7;
}

.owner-role{
font-size:11px;
letter-spacing:2px;
text-transform:uppercase;
color:#7c7c7c;
}

/* QUOTE */
.hero-quote{
font-size:13px;
line-height:1.7;
color:#d5d5d5;
text-align:center;
padding:14px 16px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
border-radius:18px;
margin-bottom:22px;
}

/* SEPARATOR */
.sep{
position:relative;
height:24px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin:8px 0;
}

.sep::before{
content:'';
position:absolute;
width:100%;
height:1px;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
rgba(255,255,255,.22),
rgba(255,255,255,.08),
transparent
);
}

.sep::after{
content:'';
position:absolute;
width:140px;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.2),
transparent
);
filter:blur(1px);
animation:sepSweep 3s ease-in-out infinite;
}

.sep-dot{
width:8px;
height:8px;
border-radius:50%;
background:white;
position:relative;
z-index:2;
box-shadow:
0 0 10px rgba(255,255,255,.8),
0 0 18px rgba(255,255,255,.2);
animation:dotPulse 2s ease-in-out infinite;
}

@keyframes sepSweep{
0%{
transform:translateX(-220px);
opacity:0;
}
20%{
opacity:1;
}
80%{
opacity:1;
}
100%{
transform:translateX(220px);
opacity:0;
}
}

@keyframes dotPulse{
0%,100%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.3);
opacity:.7;
}
}

/* MAIN */
.main{
padding:0 20px 28px;
position:relative;
z-index:2;
}

/* SECTION */
.section{
background:linear-gradient(
180deg,
rgba(255,255,255,.035),
rgba(255,255,255,.02)
);
border:1px solid rgba(255,255,255,.06);
border-radius:24px;
padding:18px;
margin-bottom:20px;
box-shadow:0 8px 26px rgba(0,0,0,.35);
backdrop-filter:blur(18px);
}

/* TITLES */
.section-title{
font-family:'Outfit',sans-serif;
font-size:18px;
font-weight:700;
margin-bottom:5px;
}

.section-sub{
font-size:12px;
color:#8b8b8b;
margin-bottom:16px;
}

/* MEMBERS */
.members-list{
display:flex;
flex-direction:column;
gap:10px;
}

.member{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:18px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.05);
text-decoration:none;
transition:.18s;
}

.member:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.05);
border-color:rgba(255,255,255,.12);
}

.member img{
width:42px;
height:42px;
border-radius:50%;
object-fit:cover;
}

.member-name{
font-size:14px;
font-weight:700;
color:white;
}

.member-meta{
font-size:11px;
color:#9a9a9a;
margin-top:2px;
}

.member-time{
margin-left:auto;
font-size:11px;
color:#767676;
}

/* SCOUT CARD */
.scout-card{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
border-radius:20px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.06);
text-decoration:none;
transition:.22s;
position:relative;
overflow:hidden;
}

.scout-card::before{
content:'';
position:absolute;
top:0;
left:-130%;
width:60%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.06),
transparent
);
transform:skewX(-18deg);
transition:.5s;
}

.scout-card:hover::before{
left:180%;
}

.scout-card:hover{
transform:translateY(-3px);
border-color:rgba(255,255,255,.13);
box-shadow:0 8px 24px rgba(0,0,0,.28);
}

.scout-left{
display:flex;
flex-direction:column;
}

.scout-title{
font-size:14px;
font-weight:700;
color:white;
margin-bottom:3px;
}

.scout-sub{
font-size:11px;
color:#8d8d8d;
}

.scout-arrow{
font-size:18px;
color:white;
opacity:.7;
transition:.2s;
}

.scout-card:hover .scout-arrow{
transform:translateX(4px);
opacity:1;
}

/* FOOTER */
.footer{
padding:10px 20px 30px;
text-align:center;
font-size:11px;
color:#666;
letter-spacing:.4px;
position:relative;
z-index:2;
}
</style>

<script>
function ago(ts){

const s=Math.floor((Date.now()-ts*1000)/1000);

if(s<60)return s+'s ago';
if(s<3600)return Math.floor(s/60)+'m ago';
if(s<86400)return Math.floor(s/3600)+'h ago';
if(s<604800)return Math.floor(s/86400)+'d ago';

return Math.floor(s/604800)+'w ago';
}

(async function(){

try{

const r=await fetch('https://api.chess.com/pub/club/the-otf-champions-of-chess/members');

const d=await r.json();

const all=[
...(d.weekly||[]),
...(d.monthly||[])
]
.sort((a,b)=>b.joined-a.joined)
.slice(0,4);

const rows=await Promise.all(all.map(async m=>{

const [pj,st]=await Promise.all([

fetch('https://api.chess.com/pub/player/'+m.username)
.then(x=>x.json()),

fetch('https://api.chess.com/pub/player/'+m.username+'/stats')
.then(x=>x.json())

]);

const rats=[

{t:'Rapid',v:st.chess_rapid?.last?.rating},
{t:'Blitz',v:st.chess_blitz?.last?.rating},
{t:'Bullet',v:st.chess_bullet?.last?.rating},
{t:'Daily',v:st.chess_daily?.last?.rating}

]
.filter(x=>x.v)
.sort((a,b)=>b.v-a.v);

const best=rats[0]||{t:'?',v:'?'};

return{
u:m.username,
av:pj.avatar || 'https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/default-pawn.png',
rt:best.t,
rv:best.v,
j:m.joined
};

}));

document.getElementById('membersList').innerHTML=

rows.map(m=>`

<a class="member"
href="https://www.chess.com/member/${m.u}"
target="_blank">

<img src="${m.av}">

<div>

<div class="member-name">
@${m.u}
</div>

<div class="member-meta">
${m.rt} • ${m.rv}
</div>

</div>

<div class="member-time">
${ago(m.j)}
</div>

</a>

`).join('');

}catch(e){

document.getElementById('membersList').innerHTML=
'<div style="font-size:12px;color:#888;">Unable to load members.</div>';

}

})();
</script>
